<!DOCTYPE html>
<html>
<head>
    <title>YOLO Mask Detection</title>
</head>
<body>

<h2>Upload Image</h2>
<form action="/detect_image" method="post" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <button type="submit">Detect</button>
</form>

{% if image %}
    <h3>Result:</h3>
    <img src="{{ image }}" width="400">
{% endif %}

</body>
</html>
